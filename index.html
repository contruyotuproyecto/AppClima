<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Weather App - Aplicación de clima en tiempo real. Consulta el pronóstico, temperatura, humedad y más. Desarrollado por Paulo Jimenez.">
    <meta name="keywords" content="clima, tiempo, pronóstico, temperatura, aplicación clima, OpenWeather, Costa Rica">
    <meta name="author" content="Paulo Jimenez">
    <meta name="theme-color" content="#3498db">
    <meta name="robots" content="index, follow">
    <!-- Open Graph -->
    <meta property="og:title" content="Weather App - Consulta el Clima en Tiempo Real">
    <meta property="og:description" content="La mejor aplicación para consultar el clima en cualquier parte del mundo. Diseño responsivo y datos en tiempo real.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tu-dominio.com">
    <meta property="og:image" content="https://tu-dominio.com/assets/jpdev.png">
    <!-- Favicon -->
    <title>Weather App - Consulta el Clima en Tiempo Real</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Iconos de Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="logo-title">
            <img src="assets/jpdev.jpeg" alt="Paulo Jimenez Logo" class="brand-logo" width="115" height="100">
            <h1>
              <i class="fas fa-cloud-sun"></i> App de Clima
            </h1>
            <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
              <i class="fas fa-moon"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Botón Flotante WhatsApp -->
      <a href="https://walink.co/b4a464" class="whatsapp-btn" target="_blank" rel="noopener noreferrer" aria-label="Contactar por WhatsApp">
        <i class="fab fa-whatsapp"></i>
      </a>

      <!-- Sección de Búsqueda -->
      <section class="search-section">
        <div class="search-container">
          <input type="text" id="cityInput" placeholder="Busca una ciudad... (ej: San José, CR)" class="search-input" aria-label="Buscar ciudad" autocomplete="off">
          <button class="search-btn" id="searchBtn" aria-label="Buscar">
            <i class="fas fa-search"></i> Buscar
          </button>
          <!-- Lista de autocompletado -->
          <ul id="autocompleteList" class="autocomplete-list"></ul>
        </div>
        <!-- Filtros -->
        <div class="filters">
          <select id="unitSelect" class="filter-select" aria-label="Unidad de temperatura">
            <option value="metric">°C (Celsius)</option>
            <option value="imperial">°F (Fahrenheit)</option>
          </select>
        </div>
      </section>

      <!-- Contenedor Principal -->
      <main class="weather-container">
        <div class="loading" id="loading">
          <i class="fas fa-spinner"></i>
          <p>Cargando clima...</p>
        </div>
        <div class="error" id="error"></div>
        <section class="current-weather" id="currentWeather"></section>
        <section class="forecast-section" id="forecastSection">
          <h2>Pronóstico de 5 Días</h2>
          <div class="forecast-container" id="forecastContainer"></div>
        </section>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <p>© 2025 Weather App | Datos proporcionados por <a href="https://openweathermap.org/" target="_blank">OpenWeather</a></p>
        <p class="credits">
          Desarrollado por <strong>Paulo Jimenez</strong> |
          <a href="https://github.com/contruyotuproyecto" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-github"></i> GitHub
          </a> |
          <a href="https://walink.co/b4a464" target="_blank">Contáctame para desarrollo web</a>
        </p>
      </footer>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
